---
MUTATION_PARAMS:
    NO_MUT: 0.1                          # No mutation
    RL_HP_MUT: 0.6                       # Learning HP mutation
    MUT_SD: 0.1                          # Mutation strength
    RAND_SEED: 42                        # Random seed
    MIN_LR: 0.0000001
    MAX_LR: 0.00001
    MIN_BETA: 0.0001
    MAX_BETA: 0.01
    MIN_GROUP_SIZE: 4
    MAX_GROUP_SIZE: 12


INIT_HP:
    ALGO: GSPO
    BATCH_SIZE: 4
    BETA: 1.0e-3
    LR: 5.0e-6
    CLIP_COEF: 0.2
    MAX_GRAD_NORM: 0.1
    UPDATE_EPOCHS: 1
    GROUP_SIZE: 16
    TEMPERATURE: 0.9
    MAX_MODEL_LEN: 1024
    MAX_OUTPUT_TOKENS: 64
    COSINE_lR_SCHEDULER:
    USE_KL_ADVANTAGE_SHAPING: true
    ADV_NORM: mean_only
    TOURN_SIZE: 2
    USE_MEMORY_EFFICIENT_PARAMS: true
    ELITISM: true
    POP_SIZE: 1
    EVAL_LOOP: 1
    USE_VLLM: true
    MICRO_BATCH_SIZE_PER_GPU: 4
    TARGET_MODULES:
        - q_proj
        - k_proj
        - v_proj
        - o_proj
    LORA_R: 16
    LORA_ALPHA: 64
    LORA_DROPOUT: 0.05
    LORA_BIAS: none
